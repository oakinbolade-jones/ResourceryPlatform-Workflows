services:
  identity-service:
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - ConnectionStrings__ResourceryPlatformWorkflowAdministrationDb=Server=${SQLSERVER_HOST:-CONF-AJCHIGBU},${SQLSERVER_PORT:-1433};User Id=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};TrustServerCertificate=True;Encrypt=False;Database=ResourceryPlatformWorkflow_AdministrationDb;
      - ConnectionStrings__ResourceryPlatformWorkflowIdentityServiceDb=Server=${SQLSERVER_HOST:-CONF-AJCHIGBU},${SQLSERVER_PORT:-1433};User Id=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};TrustServerCertificate=True;Encrypt=False;Database=ResourceryPlatformWorkflow_IdentityServiceDb;
      - ConnectionStrings__ResourceryPlatformWorkflowSaaSDb=Server=${SQLSERVER_HOST:-CONF-AJCHIGBU},${SQLSERVER_PORT:-1433};User Id=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};TrustServerCertificate=True;Encrypt=False;Database=ResourceryPlatformWorkflow_SaaSDb;
      - ConnectionStrings__redis=${REDIS_HOST:-smartserve-redis}:${REDIS_PORT_INTERNAL:-6379}
      - ConnectionStrings__rabbitmq=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@${RABBITMQ_HOST:-smartserve-rabbitmq}:${RABBITMQ_PORT_INTERNAL:-5672}/
      - ConnectionStrings__seq=${SEQ_URL:-http://smartserve-seq:5341}
      - RabbitMQ__Connections__Default__HostName=${RABBITMQ_HOST:-smartserve-rabbitmq}
      - RabbitMQ__Connections__Default__Port=${RABBITMQ_PORT_INTERNAL:-5672}
      - RabbitMQ__Connections__Default__UserName=${RABBITMQ_USER:-guest}
      - RabbitMQ__Connections__Default__Password=${RABBITMQ_PASSWORD:-guest}
      - AuthServer__Authority=${IDENTITY_SERVICE_INTERNAL_URL:-http://identity-service:8080/}
      - AuthServer__RequireHttpsMetadata=false
    ports:
      - "${IDENTITY_SERVICE_PORT:-7002}:8080"
