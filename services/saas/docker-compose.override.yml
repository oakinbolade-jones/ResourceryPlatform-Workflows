services:
  identity-server:
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - ConnectionStrings__Default=Server=${SQLSERVER_HOST:-host.docker.internal},${SQLSERVER_PORT:-1433};Database=SaaS_Identity;Trusted_Connection=True;User=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};Integrated Security=false
      - ConnectionStrings__SqlServerCache=Server=${SQLSERVER_HOST:-host.docker.internal},${SQLSERVER_PORT:-1433};Database=SaaS_Cache;Trusted_Connection=True;User=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};Integrated Security=false
    ports:
      - "${SAAS_STACK_IDENTITY_SERVER_PORT:-51600}:80"

  saa-s:
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - ConnectionStrings__Default=Server=${SQLSERVER_HOST:-host.docker.internal},${SQLSERVER_PORT:-1433};Database=SaaS_ModuleDb;Trusted_Connection=True;User=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};Integrated Security=false
      - ConnectionStrings__AbpSettingManagement=Server=${SQLSERVER_HOST:-host.docker.internal},${SQLSERVER_PORT:-1433};Database=SaaS_Identity;Trusted_Connection=True;User=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};Integrated Security=false
      - ConnectionStrings__AbpPermissionManagement=Server=${SQLSERVER_HOST:-host.docker.internal},${SQLSERVER_PORT:-1433};Database=SaaS_Identity;Trusted_Connection=True;User=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};Integrated Security=false
      - ConnectionStrings__AbpAuditLogging=Server=${SQLSERVER_HOST:-host.docker.internal},${SQLSERVER_PORT:-1433};Database=SaaS_Identity;Trusted_Connection=True;User=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};Integrated Security=false
      - ConnectionStrings__SqlServerCache=Server=${SQLSERVER_HOST:-host.docker.internal},${SQLSERVER_PORT:-1433};Database=SaaS_Cache;Trusted_Connection=True;User=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};Integrated Security=false
      - AuthServer__Authority=${IDENTITY_SERVER_INTERNAL_URL:-http://identity-server}
    ports:
      - "${SAAS_STACK_SERVICE_PORT:-51601}:80"