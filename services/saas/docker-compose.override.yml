services:
  saas-service:
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - ConnectionStrings__Default=Server=${SQLSERVER_HOST:-CONF-AJCHIGBU},${SQLSERVER_PORT:-1433};Database=SaaS_ModuleDb;User Id=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};TrustServerCertificate=True;Encrypt=False
      - ConnectionStrings__AbpSettingManagement=Server=${SQLSERVER_HOST:-CONF-AJCHIGBU},${SQLSERVER_PORT:-1433};Database=SaaS_Identity;User Id=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};TrustServerCertificate=True;Encrypt=False
      - ConnectionStrings__AbpPermissionManagement=Server=${SQLSERVER_HOST:-CONF-AJCHIGBU},${SQLSERVER_PORT:-1433};Database=SaaS_Identity;User Id=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};TrustServerCertificate=True;Encrypt=False
      - ConnectionStrings__AbpAuditLogging=Server=${SQLSERVER_HOST:-CONF-AJCHIGBU},${SQLSERVER_PORT:-1433};Database=SaaS_Identity;User Id=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};TrustServerCertificate=True;Encrypt=False
      - ConnectionStrings__SqlServerCache=Server=${SQLSERVER_HOST:-CONF-AJCHIGBU},${SQLSERVER_PORT:-1433};Database=SaaS_Cache;User Id=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};TrustServerCertificate=True;Encrypt=False
      - ConnectionStrings__redis=${REDIS_HOST:-smartserve-redis}:${REDIS_PORT_INTERNAL:-6379}
      - ConnectionStrings__rabbitmq=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@${RABBITMQ_HOST:-smartserve-rabbitmq}:${RABBITMQ_PORT_INTERNAL:-5672}/
      - ConnectionStrings__seq=${SEQ_URL:-http://smartserve-seq:5341}
      - RabbitMQ__Connections__Default__HostName=${RABBITMQ_HOST:-smartserve-rabbitmq}
      - RabbitMQ__Connections__Default__Port=${RABBITMQ_PORT_INTERNAL:-5672}
      - RabbitMQ__Connections__Default__UserName=${RABBITMQ_USER:-guest}
      - RabbitMQ__Connections__Default__Password=${RABBITMQ_PASSWORD:-guest}
      - AuthServer__Authority=${IDENTITY_SERVER_INTERNAL_URL:-http://host.docker.internal:7600/}
    ports:
      - "${SAAS_SERVICE_PORT:-7003}:80"