services:
  sqlserver:
    environment:
      - MSSQL_SA_PASSWORD=${SQLSERVER_PASSWORD:-P@ssw0rd123}
      - ACCEPT_EULA=Y
    ports:
      - "51599:1433"

  identity-server:
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - ConnectionStrings__Default=Server=${SQLSERVER_HOST:-sqlserver},${SQLSERVER_PORT:-1433};Database=Workflow_Identity;Trusted_Connection=True;User=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};Integrated Security=false
      - ConnectionStrings__SqlServerCache=Server=${SQLSERVER_HOST:-sqlserver},${SQLSERVER_PORT:-1433};Database=Workflow_Cache;Trusted_Connection=True;User=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};Integrated Security=false
    ports:
      - "51600:80"

  projects:
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - ConnectionStrings__Default=Server=${SQLSERVER_HOST:-sqlserver},${SQLSERVER_PORT:-1433};Database=Workflow_ModuleDb;Trusted_Connection=True;User=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};Integrated Security=false
      - ConnectionStrings__AbpSettingManagement=Server=${SQLSERVER_HOST:-sqlserver},${SQLSERVER_PORT:-1433};Database=Workflow_Identity;Trusted_Connection=True;User=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};Integrated Security=false
      - ConnectionStrings__AbpPermissionManagement=Server=${SQLSERVER_HOST:-sqlserver},${SQLSERVER_PORT:-1433};Database=Workflow_Identity;Trusted_Connection=True;User=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};Integrated Security=false
      - ConnectionStrings__AbpAuditLogging=Server=${SQLSERVER_HOST:-sqlserver},${SQLSERVER_PORT:-1433};Database=Workflow_Identity;Trusted_Connection=True;User=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};Integrated Security=false
      - ConnectionStrings__SqlServerCache=Server=${SQLSERVER_HOST:-sqlserver},${SQLSERVER_PORT:-1433};Database=Workflow_Cache;Trusted_Connection=True;User=${SQLSERVER_USER:-sa};Password=${SQLSERVER_PASSWORD:-P@ssw0rd123};Integrated Security=false
      - AuthServer__Authority=http://identity-server
    ports:
      - "51601:80"