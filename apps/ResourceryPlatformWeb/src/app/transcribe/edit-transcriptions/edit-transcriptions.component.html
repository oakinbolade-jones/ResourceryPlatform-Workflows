<div class="container bg-white min-vh-50 p-5 border border-success rounded transcription-page">
  <div class="d-flex align-items-center gap-2 mb-4">
    <img
      src="assets/images/logo/ecowas-circle-logo.png"
      alt="DCP SmartServe"
      style="max-height: 50px; width: auto"
    />
    <h2 class="fw-bold fs-4 mb-0">{{ 'Workflow::ECOWASS2Title' | abpLocalization }}</h2>
  </div>

  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
    <h3 class="fw-bold fs-5 mb-0">{{ 'Workflow::Transcription:EditLabel' | abpLocalization }}</h3>
    <button type="button" class="btn btn-outline-success rounded-0" (click)="goBack()">
      Back to list
    </button>
  </div>

  <div *ngIf="loading" class="state-banner state-loading">{{ 'Workflow::Transcription:LoadingLabel' | abpLocalization }}</div>
  <div *ngIf="error" class="state-banner state-error">{{ error }}</div>
  <div *ngIf="saveStatus" class="state-banner state-success">{{ saveStatus }}</div>

  <form *ngIf="!loading && !error" [formGroup]="form" (ngSubmit)="save()" class="edit-form">
    <div class="row g-3">
      <div class="col-12 col-md-6">
        <label class="form-label fw-semibold mb-1">Title</label>
        <input type="text" class="form-control border border-success rounded-0" formControlName="title" />
      </div>

      <div class="col-12 col-md-6">
        <label class="form-label fw-semibold mb-1">Event Date</label>
        <input type="date" class="form-control border border-success rounded-0" formControlName="eventDate" />
      </div>

      <div class="col-12 col-md-6">
        <label class="form-label fw-semibold mb-1">Language</label>
        <input type="text" class="form-control border border-success rounded-0" formControlName="language" />
      </div>

      <div class="col-12 col-md-6">
        <label class="form-label fw-semibold mb-1">Status</label>
        <input type="text" class="form-control border border-success rounded-0" formControlName="status" />
      </div>

      <div class="col-12">
        <label class="form-label fw-semibold mb-1">Description</label>
        <textarea rows="4" class="form-control border border-success rounded-0" formControlName="description"></textarea>
      </div>

      <div class="col-12">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" formControlName="isPublic" id="isPublic" />
          <label class="form-check-label" for="isPublic">Public</label>
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-end mt-4">
      <button type="submit" class="btn btn-success rounded-0" [disabled]="saving">
        {{ saving ? 'Saving...' : 'Save changes' }}
      </button>
    </div>
  </form>
</div>
