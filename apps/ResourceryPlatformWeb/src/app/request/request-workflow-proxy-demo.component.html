<section class="proxy-demo-card">
  <h2>Workflow Proxy Demo</h2>
  <p class="hint">Run end-to-end CRUD calls for the new workflow endpoints from this page.</p>

  <div class="grid">
    <label>
      Service Name
      <input [(ngModel)]="serviceName" type="text" placeholder="My Service" />
    </label>
    <label>
      Service ID
      <input [(ngModel)]="serviceId" type="text" placeholder="service-guid" />
    </label>
    <label>
      Workflow ID
      <input [(ngModel)]="workflowId" type="text" placeholder="workflow-guid" />
    </label>
    <label>
      Request ID
      <input [(ngModel)]="requestId" type="text" placeholder="request-guid" />
    </label>
    <label>
      Step ID
      <input [(ngModel)]="stepId" type="text" placeholder="step-guid" />
    </label>
    <label>
      Instance ID
      <input [(ngModel)]="instanceId" type="text" placeholder="instance-guid" />
    </label>
    <label>
      Task ID
      <input [(ngModel)]="taskId" type="text" placeholder="task-guid" />
    </label>
    <label>
      Assignee User ID
      <input [(ngModel)]="assigneeUserId" type="text" placeholder="user-guid" />
    </label>
    <label>
      Actor User ID
      <input [(ngModel)]="actorUserId" type="text" placeholder="user-guid" />
    </label>
  </div>

  <div class="actions">
    <button type="button" class="btn btn-secondary" [disabled]="isBusy" (click)="createService()">
      A. Create Service
    </button>
    <button type="button" class="btn btn-outline-secondary" [disabled]="isBusy" (click)="updateService()">
      B. Update Service
    </button>
    <button type="button" class="btn btn-outline-secondary" [disabled]="isBusy" (click)="attachWorkflow()">
      C. Attach Workflow → Service
    </button>
    <button type="button" class="btn btn-outline-danger" [disabled]="isBusy" (click)="deleteService()">
      D. Delete Service
    </button>
    <button type="button" class="btn btn-primary" [disabled]="isBusy" (click)="createWorkflow()">
      1. Create Workflow + Steps
    </button>
    <button type="button" class="btn btn-outline-primary" [disabled]="isBusy" (click)="updateWorkflow()">
      2. Update Workflow
    </button>
    <button type="button" class="btn btn-outline-secondary" [disabled]="isBusy" (click)="createStep()">
      3. Create Step
    </button>
    <button type="button" class="btn btn-info" [disabled]="isBusy" (click)="createInstance()">
      4. Create Instance
    </button>
    <button type="button" class="btn btn-warning" [disabled]="isBusy" (click)="createTask()">
      5. Create Task
    </button>
    <button
      type="button"
      class="btn btn-success"
      [disabled]="isBusy"
      (click)="completeTaskAndWriteHistory()"
    >
      6. Complete Task + History
    </button>
    <button type="button" class="btn btn-danger" [disabled]="isBusy" (click)="deleteWorkflow()">
      7. Delete Workflow
    </button>
  </div>

  <div class="result">
    <strong>Status:</strong> {{ lastMessage }}
  </div>

  <pre>{{ lastPayload }}</pre>
</section>
